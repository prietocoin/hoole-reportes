<script>
    function generar() {
        const cli = document.getElementById('f-cliente').value;
        const fec = document.getElementById('f-fecha').value;
        if(!cli || !fec) return alert("Selecciona fecha y cliente");

        // El v= lo usamos para que no se quede pegada la versión vieja
        Papa.parse('B_Maestra.csv?v=' + Date.now(), {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(res) {
                const inicio = new Date(fec + 'T00:00:00').getTime() / 1000;
                const fin = new Date(fec + 'T23:59:59').getTime() / 1000;

                const dataCli = res.data.filter(r => r.Grupo_1 && r.Grupo_1.trim() === cli);

                let ant = dataCli.reduce((acc, r) => {
                    return parseInt(r.Timestamp) < inicio ? acc + parseFloat(r.Saldo_1 || 0) : acc;
                }, 0);

                let movs = dataCli.filter(r => {
                    let ts = parseInt(r.Timestamp);
                    return ts >= inicio && ts <= fin;
                });

                document.getElementById('out-cli').innerText = cli;
                document.getElementById('out-fec').innerText = fec;
                document.getElementById('out-ant').innerText = ant.toLocaleString('en-US', {minimumFractionDigits:2});
                
                let h = "", ac = ant;
                movs.forEach(m => {
                    let v = parseFloat(m.Saldo_1 || 0); ac += v;
                    h += `<tr><td>${m.Operacion || 'PAGO'}</td><td style="text-align:right"><b>${v.toLocaleString('en-US', {minimumFractionDigits:2})}</b></td><td style="text-align:right; color:#888">${ac.toLocaleString('en-US', {minimumFractionDigits:2})}</td></tr>`;
                });
                document.getElementById('out-tabla').innerHTML = h || '<tr><td colspan="3" style="text-align:center; padding:20px;">Sin movimientos</td></tr>';
                document.getElementById('out-fin').innerText = ac.toLocaleString('en-US', {minimumFractionDigits:2});
            }
        });
    }
</script>
