<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOOLE Pro - Reportes Automáticos</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --b: #000; --g: #27ae60; --f: #f8f9fa; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--f); padding: 15px; display: flex; flex-direction: column; align-items: center; color: #333; }
        .controles { background: white; padding: 25px; border-radius: 16px; width: 100%; max-width: 420px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px; box-sizing: border-box; }
        h2 { text-align: center; font-size: 18px; margin-bottom: 20px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        label { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; margin-left: 2px; }
        input, button, select { width: 100%; padding: 14px; margin: 8px 0 18px 0; border: 1px solid #e0e0e0; border-radius: 10px; font-size: 16px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--b); }
        button { background: var(--b); color: white; font-weight: 800; cursor: pointer; border: none; transition: all 0.2s; text-transform: uppercase; }
        button:active { transform: scale(0.96); }
        
        #reporte { background: white; width: 380px; padding: 35px; box-sizing: border-box; color: #1a1a1a; position: relative; }
        .header { border-bottom: 5px solid var(--b); text-align: center; margin-bottom: 20px; padding-bottom: 15px; }
        .header h1 { margin: 0; font-size: 40px; letter-spacing: 4px; font-weight: 900; }
        .header p { margin: 5px 0 0 0; font-size: 10px; font-weight: 700; color: #666; letter-spacing: 1px; }
        .meta { display: flex; justify-content: space-between; font-size: 11px; font-weight: 800; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        .saldo-box { background: #f4f4f4; padding: 15px; border-left: 6px solid var(--g); margin-bottom: 20px; font-size: 16px; font-weight: 800; display: flex; justify-content: space-between; }
        
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { text-align: left; padding: 10px; border-bottom: 2px solid var(--b); color: #888; }
        td { padding: 12px 10px; border-bottom: 1px solid #f0f0f0; vertical-align: top; }
        .monto { text-align: right; font-weight: 800; }
        .total-area { margin-top: 20px; padding-top: 15px; border-top: 5px solid var(--b); text-align: right; }
        .total-val { font-size: 28px; font-weight: 900; color: var(--b); }
        .footer-text { font-size: 8px; color: #ccc; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>

<div class="controles">
    <h2>Generador de Reportes</h2>
    
    <label>Fecha de Operación</label>
    <input type="date" id="f-fecha">
    
    <label>Seleccionar Cliente</label>
    <input type="text" id="f-cliente" list="clientes-list" placeholder="Toca para ver la lista...">
    <datalist id="clientes-list">
        <option value="OMAR"><option value="YARELIS"><option value="JOSEM"><option value="CHASAN">
        <option value="NELSY"><option value="MARIANNYS"><option value="ADA"><option value="IRIS">
        <option value="MICHEL"><option value="ELIS"><option value="EDWIN"><option value="ARGENIS">
        <option value="JAIPY"><option value="FUNDDA"><option value="RENE"><option value="HEIDI">
        <option value="JAIRIS"><option value="VICTOR"><option value="JAVIER"><option value="ANGEL">
        <option value="EDGAR"><option value="SUBERO"><option value="CARLA"><option value="JOHANA">
        <option value="EMILY"><option value="INES"><option value="ANGI"><option value="ROSANGEL">
        <option value="MERLI"><option value="LUIS"><option value="ARACELIS"><option value="ENZO">
        <option value="ALEJANDRO"><option value="BEATRIZ"><option value="YAIR"><option value="ALEJANDRA">
        <option value="LUISANY"><option value="AIDA"><option value="CINDY"><option value="JUNIOR">
        <option value="KARLA"><option value="AL MAYOR"><option value="ROSIMAR"><option value="JAIDELIS">
        <option value="CORREGIR"><option value="JOHN"><option value="MAURO"><option value="COMPRA">
        <option value="JUAN"><option value="RICARDO"><option value="NAUPAR">
    </datalist>

    <button onclick="generar()">Cargar Datos y Filtrar</button>
</div>

<div id="reporte">
    <div class="header">
        <h1>HOOLE</h1>
        <p>COMPROBANTE DIARIO DE OPERACIONES</p>
    </div>
    <div class="meta">
        <span>CLIENTE: <span id="out-cli">---</span></span>
        <span>FECHA: <span id="out-fec">---</span></span>
    </div>
    <div class="saldo-box">
        <span>Saldo Anterior (Arrastre):</span>
        <span id="out-ant">0.00</span>
    </div>
    <table>
        <thead><tr><th>DESCRIPCIÓN / HASH</th><th style="text-align:right">MONTO</th><th style="text-align:right">SALDO</th></tr></thead>
        <tbody id="out-tabla"></tbody>
    </table>
    <div class="total-area">
        <span style="font-size: 11px; font-weight: 800;">SALDO FINAL AL CIERRE:</span><br>
        <span class="total-val" id="out-fin">0.00</span>
    </div>
    <p class="footer-text">Documento oficial generado por Hoole System</p>
</div>

<button onclick="compartir()" style="background: var(--g); width: 380px; margin-top: 15px; font-size: 18px;">📸 COMPARTIR REPORTE</button>

<script>
    function generar() {
        const cli = document.getElementById('f-cliente').value.toUpperCase().trim();
        const fec = document.getElementById('f-fecha').value;
        if(!cli || !fec) return alert("Por favor selecciona fecha y cliente");

        // Convertir fecha a timestamp de inicio y fin de día
        const inicioDia = new Date(fec + 'T00:00:00').getTime() / 1000;
        const finDia = new Date(fec + 'T23:59:59').getTime() / 1000;

        Papa.parse('B_Maestra.csv', {
            download: true, header: true, skipEmptyLines: true,
            complete: function(res) {
                // 1. Saldo Anterior (Suma de todo lo anterior al día elegido)
                let ant = res.data.reduce((acc, r) => {
                    if(r.Grupo_1 === cli && parseInt(r.Timestamp) < inicioDia) return acc + parseFloat(r.Saldo_1 || 0);
                    return acc;
                }, 0);

                // 2. Movimientos del día
                let movs = res.data.filter(r => {
                    let ts = parseInt(r.Timestamp);
                    return r.Grupo_1 === cli && ts >= inicioDia && ts <= finDia;
                }).slice(0, 15); // Mostramos hasta 15 para que quepa en la imagen

                // 3. Renderizado
                document.getElementById('out-cli').innerText = cli;
                document.getElementById('out-fec').innerText = fec;
                document.getElementById('out-ant').innerText = ant.toLocaleString('en-US', {minimumFractionDigits:2});
                
                let html = "", acum = ant;
                movs.forEach(m => {
                    let v = parseFloat(m.Saldo_1 || 0); acum += v;
                    html += `<tr>
                        <td>${m.Operacion || 'Remesa'} <br><small style="color:#999; font-size:9px">${m.Hash_Corto || ''}</small></td>
                        <td class="monto">${v.toLocaleString('en-US', {minimumFractionDigits:2})}</td>
                        <td style="text-align:right; color:#888">${acum.toLocaleString('en-US', {minimumFractionDigits:2})}</td>
                    </tr>`;
                });
                document.getElementById('out-tabla').innerHTML = html || '<tr><td colspan="3" style="text-align:center; padding: 20px;">No hay movimientos registrados hoy.</td></tr>';
                document.getElementById('out-fin').innerText = acum.toLocaleString('en-US', {minimumFractionDigits:2});
            }
        });
    }

    async function compartir() {
        const node = document.getElementById('reporte');
        const canvas = await html2canvas(node, {scale:3, backgroundColor: "#ffffff"});
        const link = document.createElement('a');
        link.download = `Reporte_${document.getElementById('out-cli').innerText}.jpg`;
        link.href = canvas.toDataURL("image/jpeg", 0.9);
        link.click();
    }
</script>
</body>
</html>
