<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REPORTE DEL DIA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --b: #000; --g: #25D366; --f: #f4f7f6; }
        body { font-family: 'Inter', sans-serif; background: #000; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        .controles { background: white; padding: 15px; border-radius: 10px; width: 100%; max-width: 400px; margin-bottom: 20px; box-sizing: border-box; }
        .grid-fecha { display: grid; grid-template-columns: 1fr 2fr; gap: 10px; }
        label { font-size: 9px; font-weight: bold; color: #999; text-transform: uppercase; margin-bottom: 3px; display: block; }
        select, button { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 6px; border: 1px solid #ddd; font-size: 14px; }
        button { background: var(--b); color: white; font-weight: bold; cursor: pointer; border: none; }
        
        /* DISEÑO REPORTE COMPACTO */
        #reporte { background: white; width: 400px; padding: 25px; box-sizing: border-box; color: #333; }
        .header { border-bottom: 3px solid var(--b); margin-bottom: 15px; text-align: left; }
        .header h1 { margin: 0; font-size: 22px; font-weight: 900; text-transform: uppercase; letter-spacing: -0.5px; }
        .meta { display: flex; justify-content: space-between; font-size: 10px; font-weight: 700; color: #666; margin-bottom: 10px; }
        
        .saldo-box { background: #f1f1f1; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #000; margin-bottom: 15px; }
        .saldo-box span { font-size: 10px; color: #666; font-weight: bold; }
        .saldo-box strong { font-size: 15px; font-weight: 800; }

        table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
        th { text-align: left; font-size: 9px; text-transform: uppercase; color: #aaa; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        td { padding: 8px 5px; border-bottom: 1px solid #f9f9f9; font-size: 10px; vertical-align: top; }
        
        .desc-celda { font-size: 9px; line-height: 1.2; color: #444; max-width: 190px; word-break: break-word; }
        .monto-celda { text-align: right; font-weight: 700; font-size: 10px; }
        
        .footer { border-top: 3px solid var(--b); padding-top: 10px; text-align: right; }
        .footer small { font-weight: 800; font-size: 10px; color: #666; }
        .footer .total { font-size: 24px; font-weight: 900; color: #000; margin-top: -2px; }
    </style>
</head>
<body>

<div class="controles">
    <div class="grid-fecha">
        <div>
            <label>Día</label>
            <select id="f-dia"></select>
        </div>
        <div>
            <label>Mes</label>
            <select id="f-mes">
                <option value="ene">Enero</option>
                <option value="feb">Febrero</option>
                <option value="mar">Marzo</option>
                <option value="abr">Abril</option>
                <option value="may">Mayo</option>
                <option value="jun">Junio</option>
                <option value="jul">Julio</option>
                <option value="ago">Agosto</option>
                <option value="sep">Septiembre</option>
                <option value="oct">Octubre</option>
                <option value="nov">Noviembre</option>
                <option value="dic">Diciembre</option>
            </select>
        </div>
    </div>
    <label>Cliente</label>
    <select id="f-cliente"><option value="">Cargando...</option></select>
    <button onclick="generar()">GENERAR REPORTE</button>
</div>

<div id="reporte">
    <div class="header"><h1>REPORTE DEL DIA</h1></div>
    <div class="meta"><span id="out-cli">---</span><span id="out-fec">---</span></div>
    
    <div class="saldo-box">
        <span>SALDO ANTERIOR</span>
        <strong id="out-ant">0.00</strong>
    </div>

    <table>
        <thead><tr><th>DETALLE</th><th style="text-align:right">MONTO</th><th style="text-align:right">BALANCE</th></tr></thead>
        <tbody id="out-tabla"></tbody>
    </table>

    <div class="footer">
        <small>SALDO FINAL</small>
        <div class="total" id="out-fin">0.00</div>
    </div>
</div>

<button onclick="compartir()" style="background:var(--g); width:400px; margin-top:15px; padding:15px; border-radius:10px; color:white; font-weight:bold; border:none;">📲 ENVIAR POR WHATSAPP</button>

<script>
    let rawData = [];

    // Llenar select de días
    const dSel = document.getElementById('f-dia');
    for(let i=1; i<=31; i++) {
        let o = document.createElement('option'); o.value = i; o.innerText = i;
        dSel.appendChild(o);
    }

    async function init() {
        const res = await fetch('B_Maestra.csv?v=' + Date.now());
        const text = await res.text();
        Papa.parse(text, {
            header: true, skipEmptyLines: true, dynamicTyping: true,
            complete: function(results) {
                rawData = results.data;
                const clientes = [...new Set(rawData.map(r => r.Grupo_1).filter(Boolean))].sort();
                const s = document.getElementById('f-cliente');
                s.innerHTML = '<option value="">-- SELECCIONAR --</option>';
                clientes.forEach(c => s.innerHTML += `<option value="${c}">${c}</option>`);
                
                const h = new Date(new Date().toLocaleString("en-US", {timeZone: "America/Caracas"}));
                const m = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
                document.getElementById('f-dia').value = h.getDate();
                document.getElementById('f-mes').value = m[h.getMonth()];
            }
        });
    }

    function generar() {
        const cli = document.getElementById('f-cliente').value;
        const dia = document.getElementById('f-dia').value;
        const mes = document.getElementById('f-mes').value;
        const fBusq = `${dia}-${mes}`;

        if(!cli) return;

        // Filtrar movimientos del día para el cliente
        const movsHoy = rawData.filter(r => 
            String(r.Grupo_1) === cli && 
            String(r.Fecha_Hora || "").toLowerCase().trim() === fBusq
        );

        // Saldo anterior clavado en 0 por solicitud
        const saldoAnterior = 0.00;

        document.getElementById('out-cli').innerText = cli;
        document.getElementById('out-fec').innerText = fBusq.toUpperCase();
        document.getElementById('out-ant').innerText = saldoAnterior.toFixed(2);
        
        let html = "", ac = saldoAnterior;
        movsHoy.forEach(m => {
            let v = Number(m.Saldo_1 || 0); ac += v;
            let d = (m.Descripcion_1 || m.Operacion || 'PAGO').replace(/\n/g, ' ');
            html += `<tr>
                <td class="desc-celda"><strong>${m.Operacion || 'MOV'}</strong><br>${d}</td>
                <td class="monto-celda">${v.toLocaleString('en-US',{minimumFractionDigits:2})}</td>
                <td class="monto-celda" style="color:#999">${ac.toLocaleString('en-US',{minimumFractionDigits:2})}</td>
            </tr>`;
        });

        document.getElementById('out-tabla').innerHTML = html || '<tr><td colspan="3" style="text-align:center; padding:20px;">SIN MOVIMIENTOS</td></tr>';
        document.getElementById('out-fin').innerText = ac.toLocaleString('en-US',{minimumFractionDigits:2});
    }

    async function compartir() {
        const c = await html2canvas(document.getElementById('reporte'), { scale: 3 });
        c.toBlob(async (b) => {
            const f = new File([b], `Reporte_${document.getElementById('f-cliente').value}.png`, { type: 'image/png' });
            if (navigator.share) { await navigator.share({ files: [f] }); }
            else { const l = document.createElement('a'); l.download = f.name; l.href = URL.createObjectURL(b); l.click(); }
        });
    }
    window.onload = init;
</script>
</body>
</html>
