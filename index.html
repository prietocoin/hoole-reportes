<script>
    let rawData = [];

    async function init() {
        const status = document.getElementById('status');
        try {
            const res = await fetch('B_Maestra.csv?v=' + Date.now());
            const text = await res.text();
            Papa.parse(text, {
                header: true,
                skipEmptyLines: true,
                dynamicTyping: true, // ESTO CONVIERTE NÚMEROS AUTOMÁTICAMENTE
                complete: function(results) {
                    rawData = results.data;
                    const clientes = [...new Set(rawData.map(r => r.Grupo_1).filter(Boolean))].sort();
                    const select = document.getElementById('f-cliente');
                    select.innerHTML = '<option value="">-- SELECCIONAR CLIENTE --</option>';
                    clientes.forEach(c => select.innerHTML += `<option value="${c}">${c}</option>`);
                    document.getElementById('f-fecha').valueAsDate = new Date();
                    status.innerText = "✅ CONECTADO: " + clientes.length + " CLIENTES";
                }
            });
        } catch (e) { status.innerText = "❌ ERROR"; }
    }

    function generar() {
        const cli = document.getElementById('f-cliente').value;
        const fec = document.getElementById('f-fecha').value;
        if(!cli || !fec) return;

        // Convertir fecha seleccionada a segundos (Timestamp)
        const inicioDia = new Date(fec + 'T00:00:00').getTime() / 1000;
        const finDia = inicioDia + 86400;

        const dataCli = rawData.filter(r => String(r.Grupo_1) === cli);
        
        // Cálculo de Saldo Anterior (Todo lo que sea menor al inicio del día)
        let saldoAnterior = 0;
        dataCli.forEach(r => {
            if (Number(r.Timestamp) < inicioDia) {
                saldoAnterior += Number(r.Saldo_1 || 0);
            }
        });

        // Filtrar movimientos del día elegido
        let movs = dataCli.filter(r => {
            let ts = Number(r.Timestamp);
            return ts >= inicioDia && ts < finDia;
        });

        // Dibujar en pantalla
        document.getElementById('out-cli').innerText = cli;
        document.getElementById('out-fec').innerText = fec;
        document.getElementById('out-ant').innerText = saldoAnterior.toLocaleString('en-US', {minimumFractionDigits:2});
        
        let htmlTabla = "", acumulado = saldoAnterior;
        
        movs.forEach(m => {
            let monto = Number(m.Saldo_1 || 0);
            acumulado += monto;
            
            // Limpiar descripción de saltos de línea para que no se vea "mal"
            let descripcion = (m.Descripcion_1 || m.Operacion || 'PAGO').replace(/\n/g, ' / ');
            
            htmlTabla += `<tr>
                <td class="desc-celda"><strong>${m.Operacion || 'MOV'}</strong><br>${descripcion}</td>
                <td class="monto-celda">${monto.toLocaleString('en-US', {minimumFractionDigits:2})}</td>
                <td class="monto-celda" style="color:#666">${acumulado.toLocaleString('en-US', {minimumFractionDigits:2})}</td>
            </tr>`;
        });

        document.getElementById('out-tabla').innerHTML = htmlTabla || '<tr><td colspan="3" style="text-align:center; padding:30px;">SIN MOVIMIENTOS EN ESTA FECHA</td></tr>';
        document.getElementById('out-fin').innerText = acumulado.toLocaleString('en-US', {minimumFractionDigits:2});
    }

    async function descargar() {
        const canvas = await html2canvas(document.getElementById('reporte'), {scale: 3});
        const link = document.createElement('a');
        link.download = `HOOLE_${document.getElementById('f-cliente').value}.jpg`;
        link.href = canvas.toDataURL("image/jpeg", 1.0);
        link.click();
    }
    window.onload = init;
</script>
