<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOOLE - Sistema de Reportes</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --primary: #121212; --accent: #2ecc71; --text: #333; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        /* Interfaz de la App */
        .panel-control { background: white; padding: 20px; border-radius: 15px; width: 100%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .panel-control h2 { margin: 0 0 15px 0; font-size: 18px; text-align: center; color: var(--primary); }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { opacity: 0.9; }
        .btn-share { background: var(--accent); margin-top: 10px; }

        /* EL REPORTE (Lo que se convierte en imagen) */
        #reporte-canvas { background: white; width: 380px; padding: 25px; border-radius: 2px; color: var(--text); position: relative; }
        .header { text-align: center; border-bottom: 2px solid var(--primary); margin-bottom: 15px; padding-bottom: 10px; }
        .header h1 { margin: 0; font-size: 28px; letter-spacing: 2px; }
        .meta { display: flex; justify-content: space-between; font-size: 11px; font-weight: bold; margin-bottom: 15px; text-transform: uppercase; }
        
        .saldo-previo { background: #f8f9fa; padding: 10px; border-left: 4px solid var(--accent); margin-bottom: 15px; font-size: 13px; }
        
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { text-align: left; padding: 8px; border-bottom: 1px solid #eee; color: #777; }
        td { padding: 8px; border-bottom: 1px solid #f9f9f9; line-height: 1.4; }
        .monto { text-align: right; font-weight: bold; }
        .saldo-linea { text-align: right; color: #999; }

        .footer { margin-top: 20px; padding-top: 10px; border-top: 2px solid var(--primary); text-align: right; }
        .footer .total { font-size: 18px; font-weight: bold; }
        .page-info { font-size: 9px; color: #ccc; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>

<div class="panel-control">
    <h2>Generador de Reportes</h2>
    <input type="date" id="fecha-filtro">
    <input type="text" id="cliente-filtro" placeholder="Nombre del Cliente (Ej: FUNDDA)">
    <input type="text" id="hash-filtro" placeholder="Hash Corto (Opcional)">
    <button onclick="ejecutarSistema()">Cargar Datos y Filtrar</button>
</div>

<div id="reporte-canvas">
    <div class="header">
        <h1>HOOLE</h1>
        <div style="font-size: 10px; color: #666;">COMPROBANTE DIARIO DE OPERACIONES</div>
    </div>

    <div class="meta">
        <span>CLIENTE: <span id="out-cliente">---</span></span>
        <span>FECHA: <span id="out-fecha">---</span></span>
    </div>

    <div class="saldo-previo">
        Saldo Anterior (Arrastre): <span id="out-saldo-ant" style="float:right; font-weight:bold;">0.00</span>
    </div>

    <table>
        <thead>
            <tr>
                <th>DESCRIPCIÓN / HASH</th>
                <th style="text-align:right">MONTO</th>
                <th style="text-align:right">SALDO</th>
            </tr>
        </thead>
        <tbody id="tabla-filas">
            </tbody>
    </table>

    <div class="footer">
        <span style="font-size: 12px; color: #666;">SALDO FINAL AL CIERRE:</span><br>
        <span class="total" id="out-saldo-fin">0.00</span>
    </div>
    
    <div class="page-info">Documento oficial generado por Hoole System</div>
</div>

<button class="btn-share" onclick="descargarReporte()">COMPARTIR COMO IMAGEN (JPG)</button>

<script>
    const ARCHIVO_CSV = 'B_Maestra.csv'; // Nombre exacto de tu archivo en GitHub

    function ejecutarSistema() {
        const cliente = document.getElementById('cliente-filtro').value.trim().toUpperCase();
        const fechaInput = document.getElementById('fecha-filtro').value;
        const hashFiltro = document.getElementById('hash-filtro').value.trim();

        if(!cliente || !fechaInput) {
            alert("Por favor indica Cliente y Fecha");
            return;
        }

        // Formatear fecha para comparar con tu CSV (asumiendo formato d-mmm o similar)
        // Adaptaremos la lógica para buscar por el Timestamp que es más exacto
        const fechaSeleccionada = new Date(fechaInput);
        const inicioDelDia = fechaSeleccionada.setHours(0,0,0,0) / 1000;
        const finDelDia = fechaSeleccionada.setHours(23,59,59,999) / 1000;

        Papa.parse(ARCHIVO_CSV, {
            download: true,
            header: true,
            complete: function(results) {
                const data = results.data;
                
                // 1. CALCULAR SALDO ANTERIOR (Memoria de la App)
                let saldoAnterior = 0;
                data.forEach(row => {
                    const ts = parseInt(row.Timestamp);
                    if(row.Grupo_1 === cliente && ts < inicioDelDia) {
                        saldoAnterior += parseFloat(row.Saldo_1 || 0);
                    }
                });

                // 2. FILTRAR MOVIMIENTOS DEL DÍA
                let movimientos = data.filter(row => {
                    const ts = parseInt(row.Timestamp);
                    let cumple = (row.Grupo_1 === cliente && ts >= inicioDelDia && ts <= finDelDia);
                    if(hashFiltro) cumple = cumple && row.Hash_Corto === hashFiltro;
                    return cumple;
                });

                // REGLA: 10 líneas máximo
                const listaAMostrar = movimientos.slice(0, 10);

                renderizar(listaAMostrar, saldoAnterior, cliente, fechaInput);
            }
        });
    }

    function renderizar(filas, anterior, cliente, fecha) {
        document.getElementById('out-cliente').innerText = cliente;
        document.getElementById('out-fecha').innerText = fecha;
        document.getElementById('out-saldo-ant').innerText = anterior.toLocaleString('en-US', {minimumFractionDigits: 2});
        
        const tabla = document.getElementById('tabla-filas');
        tabla.innerHTML = "";
        let acumulado = anterior;

        filas.forEach(f => {
            const monto = parseFloat(f.Saldo_1 || 0);
            acumulado += monto;
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>[${f.Hash_Corto}] ${f.Operacion || 'TRANSACCIÓN'}</td>
                <td class="monto">${monto >= 0 ? '+' : ''}${monto.toFixed(2)}</td>
                <td class="saldo-linea">${acumulado.toFixed(2)}</td>
            `;
            tabla.appendChild(tr);
        });

        document.getElementById('out-saldo-fin').innerText = acumulado.toLocaleString('en-US', {minimumFractionDigits: 2});
    }

    async function descargarReporte() {
        const elemento = document.getElementById('reporte-canvas');
        const canvas = await html2canvas(elemento, { scale: 3 });
        const img = canvas.toDataURL("image/jpeg", 0.9);
        
        const link = document.createElement('a');
        link.download = `Reporte_Hoole_${document.getElementById('out-cliente').innerText}.jpg`;
        link.href = img;
        link.click();
    }
</script>

</body>
</html>
