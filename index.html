<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOOLE - Generador Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --b: #000; --g: #27ae60; --f: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--f); padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .controles { background: white; padding: 20px; border-radius: 15px; width: 100%; max-width: 400px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 20px; box-sizing: border-box; }
        h2 { text-align: center; margin-top: 0; font-size: 20px; color: var(--b); }
        label { font-size: 11px; font-weight: bold; color: #666; display: block; margin-bottom: 5px; }
        select, input, button { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; }
        button { background: var(--b); color: white; font-weight: bold; cursor: pointer; border: none; text-transform: uppercase; }
        #reporte { background: white; width: 380px; padding: 30px; box-sizing: border-box; border: 1px solid #eee; }
        .header { border-bottom: 5px solid var(--b); text-align: center; margin-bottom: 15px; padding-bottom: 10px; }
        .header h1 { margin: 0; font-size: 40px; letter-spacing: 5px; font-weight: 900; }
        .meta { display: flex; justify-content: space-between; font-size: 11px; font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #f0f0f0; padding-bottom: 5px; }
        .saldo-box { background: #f8f8f8; padding: 12px; border-left: 5px solid var(--g); margin-bottom: 15px; font-weight: bold; display: flex; justify-content: space-between; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { text-align: left; border-bottom: 2px solid #000; padding: 5px; color: #555; }
        td { padding: 10px 5px; border-bottom: 1px solid #f0f0f0; }
        .total-box { margin-top: 15px; border-top: 5px solid var(--b); padding-top: 10px; text-align: right; }
        .status { font-size: 10px; color: var(--g); text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="controles">
    <h2>HOOLE SYSTEM</h2>
    <div id="status" class="status">Cargando base de datos...</div>
    
    <label>FECHA DEL REPORTE</label>
    <input type="date" id="f-fecha">
    
    <label>LISTA DE CLIENTES (Auto)</label>
    <select id="f-cliente">
        <option value="">-- Esperando datos --</option>
    </select>

    <button onclick="generar()">GENERAR REPORTE</button>
</div>

<div id="reporte">
    <div class="header"><h1>HOOLE</h1></div>
    <div class="meta">
        <span id="out-cli">CLIENTE: ---</span>
        <span id="out-fec">FECHA: ---</span>
    </div>
    <div class="saldo-box">
        <span>Saldo Anterior:</span>
        <span id="out-ant">0.00</span>
    </div>
    <table>
        <thead><tr><th>DESCRIPCIÓN</th><th style="text-align:right">MONTO</th><th style="text-align:right">SALDO</th></tr></thead>
        <tbody id="out-tabla"></tbody>
    </table>
    <div class="total-box">
        <small>SALDO FINAL AL CIERRE:</small><br>
        <div style="font-size: 28px; font-weight: 900;" id="out-fin">0.00</div>
    </div>
</div>

<button onclick="descargar()" style="background: var(--g); width: 380px; margin-top: 15px; color:white; padding:15px; border-radius:10px; border:none; font-weight:bold; cursor:pointer;">📸 DESCARGAR PARA WHATSAPP</button>

<script>
    let baseDeDatos = [];

    // 1. CARGAR DATOS AL INICIAR
    window.onload = function() {
        const url = 'B_Maestra.csv?v=' + Date.now();
        Papa.parse(url, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(res) {
                baseDeDatos = res.data;
                const clientes = [...new Set(res.data.map(r => r.Grupo_1).filter(Boolean))].sort();
                const select = document.getElementById('f-cliente');
                select.innerHTML = '<option value="">-- Selecciona Cliente --</option>';
                clientes.forEach(c => {
                    select.innerHTML += `<option value="${c}">${c}</option>`;
                });
                document.getElementById('status').innerText = "✅ Base de datos conectada: " + res.data.length + " filas";
                // Poner fecha de hoy por defecto
                document.getElementById('f-fecha').valueAsDate = new Date();
            },
            error: function() {
                document.getElementById('status').innerText = "❌ Error: No se encontró B_Maestra.csv";
                document.getElementById('status').style.color = "red";
            }
        });
    };

    // 2. GENERAR REPORTE
    function generar() {
        const cli = document.getElementById('f-cliente').value;
        const fec = document.getElementById('f-fecha').value;
        if(!cli || !fec) return alert("Selecciona cliente y fecha");

        // Convertir fecha a Timestamp (segundos)
        const d = new Date(fec + 'T00:00:00');
        const inicioDia = d.getTime() / 1000;
        const finDia = inicioDia + 86399;

        const dataCli = baseDeDatos.filter(r => r.Grupo_1 === cli);

        // Saldo Anterior
        let ant = dataCli.reduce((acc, r) => {
            return parseInt(r.Timestamp) < inicioDia ? acc + parseFloat(r.Saldo_1 || 0) : acc;
        }, 0);

        // Movimientos
        let movs = dataCli.filter(r => {
            let ts = parseInt(r.Timestamp);
            return ts >= inicioDia && ts <= finDia;
        });

        // Dibujar
        document.getElementById('out-cli').innerText = "CLIENTE: " + cli;
        document.getElementById('out-fec').innerText = "FECHA: " + fec;
        document.getElementById('out-ant').innerText = ant.toLocaleString('en-US', {minimumFractionDigits:2});
        
        let h = "", ac = ant;
        movs.forEach(m => {
            let v = parseFloat(m.Saldo_1 || 0);
            ac += v;
            h += `<tr>
                    <td>${m.Operacion || 'PAGO'}<br><small style="color:#999">${m.Hash_Corto || ''}</small></td>
                    <td style="text-align:right; font-weight:bold;">${v.toLocaleString('en-US', {minimumFractionDigits:2})}</td>
                    <td style="text-align:right; color:#666;">${ac.toLocaleString('en-US', {minimumFractionDigits:2})}</td>
                  </tr>`;
        });

        document.getElementById('out-tabla').innerHTML = h || '<tr><td colspan="3" style="text-align:center; padding:20px;">Sin movimientos este día</td></tr>';
        document.getElementById('out-fin').innerText = ac.toLocaleString('en-US', {minimumFractionDigits:2});
    }

    async function descargar() {
        const canvas = await html2canvas(document.getElementById('reporte'), {scale: 3});
        const link = document.createElement('a');
        link.download = `HOOLE_${document.getElementById('f-cliente').value}_${document.getElementById('f-fecha').value}.jpg`;
        link.href = canvas.toDataURL("image/jpeg", 0.9);
        link.click();
    }
</script>
</body>
</html>
