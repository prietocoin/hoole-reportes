<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REPORTE HOOLE | BALANCE FIJO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --b: #000; --g: #25D366; }
        body { font-family: 'Inter', sans-serif; background: #000; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .controles { background: white; padding: 15px; border-radius: 10px; width: 100%; max-width: 450px; margin-bottom: 20px; box-sizing: border-box; }
        .grid-filtros { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        label { font-size: 9px; font-weight: bold; color: #999; text-transform: uppercase; margin-bottom: 3px; display: block; }
        select, input, button { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 6px; border: 1px solid #ddd; font-size: 13px; box-sizing: border-box; }
        button { background: var(--b); color: white; font-weight: bold; cursor: pointer; border: none; }
        
        #reporte { background: white; width: 400px; padding: 25px; box-sizing: border-box; color: #333; }
        .header { border-bottom: 2px solid var(--b); margin-bottom: 12px; padding-bottom: 5px; }
        .header h1 { margin: 0; font-size: 18px; font-weight: 900; text-transform: uppercase; }
        .meta { display: flex; justify-content: space-between; font-size: 10px; font-weight: 800; color: #000; margin-bottom: 15px; text-transform: uppercase; }
        
        .saldo-box { border-top: 1px solid #eee; padding: 12px 0; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .saldo-box span { font-size: 8px; color: #bbb; font-weight: bold; letter-spacing: 0.5px; }
        .edit-saldo { border: 1px solid #f0f0f0; background: #fdfdfd; text-align: right; font-size: 11px; font-weight: 800; color: #000; width: 110px; padding: 4px 6px; border-radius: 4px; }

        table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
        th { text-align: left; font-size: 8px; text-transform: uppercase; color: #bbb; border-bottom: 1px solid #000; padding-bottom: 3px; }
        td { padding: 6px 4px; border-bottom: 1px solid #f9f9f9; font-size: 9px; vertical-align: top; }
        .desc-celda { line-height: 1.1; color: #555; max-width: 185px; word-break: break-word; font-size: 9px; }
        .monto-celda { text-align: right; font-weight: 700; font-size: 10px; }
        
        .footer { border-top: 2px solid var(--b); padding-top: 10px; text-align: right; }
        .footer small { font-weight: 800; font-size: 9px; color: #999; }
        .footer .total { font-size: 22px; font-weight: 900; color: #000; margin-top: -2px; }
    </style>
</head>
<body>

<div class="controles">
    <div class="grid-filtros">
        <div><label>Día</label><select id="f-dia"></select></div>
        <div><label>Mes</label><select id="f-mes">
            <option value="ene">Enero</option><option value="feb">Febrero</option>
            <option value="mar">Marzo</option><option value="abr">Abril</option>
            <option value="may">Mayo</option><option value="jun">Junio</option>
            <option value="jul">Julio</option><option value="ago">Agosto</option>
            <option value="sep">Septiembre</option><option value="oct">Octubre</option>
            <option value="nov">Noviembre</option><option value="dic">Diciembre</option>
        </select></div>
    </div>
    <div class="grid-filtros">
        <div><label>Cliente</label><select id="f-cliente" onchange="cargarHashes()"><option value="">Cargando...</option></select></div>
        <div><label>Desde Hash</label><select id="f-hash"><option value="">TODOS</option></select></div>
    </div>
    <button onclick="generar()">GENERAR REPORTE</button>
</div>

<div id="reporte">
    <div class="header"><h1>REPORTE DEL DIA</h1></div>
    <div class="meta"><span id="out-cli">---</span><span id="out-fec">---</span></div>
    
    <div class="saldo-box">
        <span>SALDO ANTERIOR (BALANCE)</span>
        <input type="number" step="0.01" id="out-ant" class="edit-saldo" value="0.00" oninput="recalcularTotal()">
    </div>

    <table>
        <thead><tr><th>DETALLE / HASH</th><th style="text-align:right">MONTO</th><th style="text-align:right">BALANCE</th></tr></thead>
        <tbody id="out-tabla"></tbody>
    </table>

    <div class="footer">
        <small>SALDO FINAL</small>
        <div class="total" id="out-fin">0.00</div>
    </div>
</div>

<button onclick="compartir()" style="background:var(--g); width:400px; margin-top:15px; padding:15px; border-radius:10px; color:white; font-weight:bold; border:none; cursor:pointer;">📲 ENVIAR POR WHATSAPP</button>

<script>
    let rawData = [];
    let movsParaTabla = [];

    const dSel = document.getElementById('f-dia');
    for(let i=1; i<=31; i++) {
        let o = document.createElement('option'); o.value = i; o.innerText = i;
        dSel.appendChild(o);
    }

    async function init() {
        try {
            const res = await fetch('./B_Maestra.csv?v=' + Date.now());
            const text = await res.text();
            Papa.parse(text, {
                header: true, skipEmptyLines: true, dynamicTyping: true,
                complete: function(results) {
                    // Ordenar por row_number para que el final del array sea lo más reciente
                    rawData = results.data.sort((a, b) => Number(a.row_number) - Number(b.row_number));
                    const clientesUnicos = [...new Set([...rawData.map(r => r.Grupo_1), ...rawData.map(r => r.Grupo_2)])].filter(Boolean).sort();
                    const s = document.getElementById('f-cliente');
                    s.innerHTML = '<option value="">-- SELECCIONAR --</option>';
                    clientesUnicos.forEach(c => s.innerHTML += `<option value="${c}">${c}</option>`);
                    
                    const h = new Date(new Date().toLocaleString("en-US", {timeZone: "America/Caracas"}));
                    const m = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
                    document.getElementById('f-dia').value = h.getDate();
                    document.getElementById('f-mes').value = m[h.getMonth()];
                }
            });
        } catch (e) { document.getElementById('f-cliente').innerHTML = '<option>Error CSV</option>'; }
    }

    function cargarHashes() {
        const cli = document.getElementById('f-cliente').value;
        const dia = document.getElementById('f-dia').value;
        const mes = document.getElementById('f-mes').value;
        const fBusq = `${dia}-${mes}`;
        const hashes = [...new Set(rawData
            .filter(r => (String(r.Grupo_1).toUpperCase() === cli.toUpperCase() || String(r.Grupo_2).toUpperCase() === cli.toUpperCase()) && String(r.Fecha_Hora || "").toLowerCase().trim() === fBusq)
            .map(r => r.Hash_Corto).filter(Boolean)
        )];
        const hSel = document.getElementById('f-hash');
        hSel.innerHTML = '<option value="">TODOS</option>';
        hashes.forEach(h => hSel.innerHTML += `<option value="${h}">${h}</option>`);
    }

    function generar() {
        const cli = document.getElementById('f-cliente').value;
        const hashCorte = document.getElementById('f-hash').value;
        const dia = document.getElementById('f-dia').value;
        const mes = document.getElementById('f-mes').value;
        const fBusq = `${dia}-${mes}`;
        if(!cli) return;

        // 1. Filtrar TODA la historia del cliente para buscar el último balance registrado
        let historiaSocio = rawData.filter(r => 
            String(r.Grupo_1).toUpperCase() === cli.toUpperCase() || 
            String(r.Grupo_2).toUpperCase() === cli.toUpperCase()
        );

        // 2. Movimientos del día seleccionado
        let movsHoy = historiaSocio.filter(r => String(r.Fecha_Hora || "").toLowerCase().trim() === fBusq);

        // 3. Aplicar corte de Hash si existe
        if (hashCorte !== "") {
            const idx = movsHoy.findIndex(m => m.Hash_Corto === hashCorte);
            movsParaTabla = (idx !== -1) ? movsHoy.slice(idx) : movsHoy;
        } else {
            movsParaTabla = movsHoy;
        }

        // --- LÓGICA DE SALDO ANTERIOR (Búsqueda global) ---
        let saldoCalculado = 0;
        
        // Si hay movimientos hoy, buscamos justo antes del primero de hoy
        if (movsParaTabla.length > 0) {
            const primerId = movsParaTabla[0].row_number;
            const previo = historiaSocio.filter(r => Number(r.row_number) < Number(primerId)).pop();
            if (previo) {
                saldoCalculado = (String(previo.Grupo_1).toUpperCase() === cli.toUpperCase()) ? parseFloat(previo.Balance_1) : parseFloat(previo.Balance_2);
            }
        } else {
            // SI NO HAY MOVIMIENTOS HOY: Buscamos el último balance de TODA su historia
            const ultimoRegistro = historiaSocio[historiaSocio.length - 1];
            if (ultimoRegistro) {
                saldoCalculado = (String(ultimoRegistro.Grupo_1).toUpperCase() === cli.toUpperCase()) ? parseFloat(ultimoRegistro.Balance_1) : parseFloat(ultimoRegistro.Balance_2);
            }
        }

        document.getElementById('out-ant').value = (saldoCalculado || 0).toFixed(2);
        document.getElementById('out-cli').innerText = cli;
        document.getElementById('out-fec').innerText = fBusq.toUpperCase();
        recalcularTotal();
    }

    function recalcularTotal() {
        const cli = document.getElementById('f-cliente').value;
        const saldoAnterior = parseFloat(document.getElementById('out-ant').value) || 0;
        let html = "", ac = saldoAnterior;

        movsParaTabla.forEach(m => {
            let v = (String(m.Grupo_1).toUpperCase() === cli.toUpperCase()) ? Number(m.Saldo_1 || 0) : Number(m.Saldo_2 || 0);
            ac = Math.round((ac + v) * 100) / 100;
            let d = (m.Descripcion_1 || m.Operacion || 'PAGO').replace(/\n/g, ' ');
            html += `<tr>
                <td class="desc-celda"><strong>${m.Operacion || 'PAGO'}</strong> [${m.Hash_Corto || ''}]<br>${d}</td>
                <td class="monto-celda">${v.toLocaleString('en-US',{minimumFractionDigits:2})}</td>
                <td class="monto-celda" style="color:#aaa">${ac.toLocaleString('en-US',{minimumFractionDigits:2})}</td>
            </tr>`;
        });
        document.getElementById('out-tabla').innerHTML = html || '<tr><td colspan="3" style="text-align:center; padding:20px; color:#999">SIN ACTIVIDAD ESTE DÍA</td></tr>';
        document.getElementById('out-fin').innerText = ac.toLocaleString('en-US',{minimumFractionDigits:2});
    }

    async function compartir() {
        const c = await html2canvas(document.getElementById('reporte'), { scale: 3 });
        c.toBlob(async (b) => {
            const f = new File([b], `Hoole_${document.getElementById('f-cliente').value}.png`, { type: 'image/png' });
            if (navigator.share) { await navigator.share({ files: [f] }); }
            else { const l = document.createElement('a'); l.download = f.name; l.href = URL.createObjectURL(b); l.click(); }
        });
    }
    window.onload = init;
</script>
</body>
</html>
