<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOOLE Pro - Reportes</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --b: #000; --g: #27ae60; --f: #f4f4f4; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--f); padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .controles { background: white; padding: 20px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; box-sizing: border-box;}
        label { font-size: 12px; font-weight: bold; color: #666; margin-left: 5px; }
        input, button { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        button { background: var(--b); color: white; font-weight: bold; cursor: pointer; border: none; transition: 0.3s; }
        button:active { transform: scale(0.98); }
        
        #reporte { background: white; width: 380px; padding: 30px; box-sizing: border-box; color: #1a1a1a; }
        .header { border-bottom: 4px solid var(--b); text-align: center; margin-bottom: 15px; padding-bottom: 10px; }
        .header h1 { margin: 0; font-size: 35px; letter-spacing: 3px; font-weight: 900; }
        .meta { display: flex; justify-content: space-between; font-size: 11px; font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .saldo-box { background: #f9f9f9; padding: 15px; border-left: 6px solid var(--g); margin-bottom: 15px; font-size: 15px; font-weight: bold; display: flex; justify-content: space-between; }
        
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { text-align: left; padding: 10px; border-bottom: 2px solid var(--b); background: #fafafa; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        .monto { text-align: right; font-weight: bold; }
        .total-area { margin-top: 15px; padding-top: 10px; border-top: 4px solid var(--b); text-align: right; }
        .total-label { font-size: 12px; font-weight: bold; }
        .total-val { font-size: 24px; font-weight: 900; color: var(--b); }
    </style>
</head>
<body>

<div class="controles">
    <label>FECHA DE REPORTE</label>
    <input type="date" id="f-fecha">
    
    <label>SELECCIONAR CLIENTE</label>
    <input type="text" id="f-cliente" list="lista-clientes" placeholder="Escribe o selecciona...">
    <datalist id="lista-clientes">
        <option value="OMAR"><option value="YARELIS"><option value="JOSEM"><option value="CHASAN">
        <option value="NELSY"><option value="MARIANNYS"><option value="ADA"><option value="IRIS">
        <option value="MICHEL"><option value="ELIS"><option value="EDWIN"><option value="ARGENIS">
        <option value="JAIPY"><option value="FUNDDA"><option value="RENE"><option value="HEIDI">
        <option value="JAIRIS"><option value="VICTOR"><option value="JAVIER"><option value="ANGEL">
        <option value="EDGAR"><option value="SUBERO"><option value="CARLA"><option value="JOHANA">
        <option value="EMILY"><option value="INES"><option value="ANGI"><option value="ROSANGEL">
        <option value="MERLI"><option value="LUIS"><option value="ARACELIS"><option value="ENZO">
        <option value="ALEJANDRO"><option value="BEATRIZ"><option value="YAIR"><option value="ALEJANDRA">
        <option value="LUISANY"><option value="AIDA"><option value="CINDY"><option value="JUNIOR">
        <option value="KARLA"><option value="AL MAYOR"><option value="ROSIMAR"><option value="JAIDELIS">
        <option value="CORREGIR"><option value="JOHN"><option value="MAURO"><option value="COMPRA">
        <option value="JUAN"><option value="RICARDO"><option value="NAUPAR">
    </datalist>

    <button onclick="generar()">GENERAR REPORTE</button>
</div>

<div id="reporte">
    <div class="header"><h1>HOOLE</h1></div>
    <div class="meta">
        <span>CLIENTE: <span id="out-cli">---</span></span>
        <span>FECHA: <span id="out-fec">---</span></span>
    </div>
    <div class="saldo-box">
        <span>Saldo Anterior:</span>
        <span id="out-ant">0.00</span>
    </div>
    <table>
        <thead><tr><th>OPERACIÓN / HASH</th><th style="text-align:right">MONTO</th><th style="text-align:right">SALDO</th></tr></thead>
        <tbody id="out-tabla"></tbody>
    </table>
    <div class="total-area">
        <span class="total-label">SALDO FINAL:</span><br>
        <span class="total-val" id="out-fin">0.00</span>
    </div>
</div>

<button onclick="compartir()" style="background: var(--g); width: 380px; margin-top: 15px; font-size: 18px;">📸 COMPARTIR REPORTE</button>

<script>
    function generar() {
        const cli = document.getElementById('f-cliente').value.toUpperCase().trim();
        const fec = document.getElementById('f-fecha').value;
        if(!cli || !fec) return alert("Selecciona fecha y cliente");

        const inicioDia = new Date(fec + 'T00:00:00').getTime() / 1000;
        const finDia = new Date(fec + 'T23:59:59').getTime() / 1000;

        Papa.parse('B_Maestra.csv', {
            download: true, header: true, skipEmptyLines: true,
            complete: function(res) {
                // 1. Saldo Anterior
                let ant = res.data.reduce((acc, r) => {
                    if(r.Grupo_1 === cli && parseInt(r.Timestamp) < inicioDia) return acc + parseFloat(r.Saldo_1 || 0);
                    return acc;
                }, 0);

                // 2. Movimientos del día (Max 10)
                let movs = res.data.filter(r => {
                    let ts = parseInt(r.Timestamp);
                    return r.Grupo_1 === cli && ts >= inicioDia && ts <= finDia;
                }).slice(0, 10);

                // 3. Render
                document.getElementById('out-cli').innerText = cli;
                document.getElementById('out-fec').innerText = fec;
                document.getElementById('out-ant').innerText = ant.toLocaleString('en-US', {minimumFractionDigits:2});
                
                let h = "", ac = ant;
                movs.forEach(m => {
                    let v = parseFloat(m.Saldo_1 || 0); ac += v;
                    h += `<tr><td>${m.Operacion || 'Remesa'} <br><small style="color:#999; font-size:9px">${m.Hash_Corto || ''}</small></td><td class="monto">${v.toLocaleString('en-US', {minimumFractionDigits:2})}</td><td style="text-align:right; color:#888">${ac.toLocaleString('en-US', {minimumFractionDigits:2})}</td></tr>`;
                });
                document.getElementById('out-tabla').innerHTML = h || '<tr><td colspan="3" style="text-align:center">Sin movimientos este día</td></tr>';
                document.getElementById('out-fin').innerText = ac.toLocaleString('en-US', {minimumFractionDigits:2});
            }
        });
    }

    async function compartir() {
        const canvas = await html2canvas(document.getElementById('reporte'), {scale:3});
        const link = document.createElement('a');
        link.download = `Reporte_${document.getElementById('out-cli').innerText}_${document.getElementById('out-fec').innerText}.jpg`;
        link.href = canvas.toDataURL("image/jpeg", 0.9);
        link.click();
    }
</script>
</body>
</html>
