<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOOLE | Reporte de Cuenta</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --b: #000; --g: #27ae60; --f: #f4f7f6; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: #1a1a1a; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .controles { background: white; padding: 20px; border-radius: 12px; width: 100%; max-width: 400px; margin-bottom: 20px; box-sizing: border-box; }
        #status { font-size: 10px; text-align: center; margin-bottom: 10px; padding: 5px; border-radius: 4px; font-weight: bold; }
        select, input, button { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; font-size: 14px; }
        button { background: var(--b); color: white; font-weight: bold; cursor: pointer; border: none; }
        
        /* DISEÑO DEL REPORTE */
        #reporte { background: white; width: 400px; padding: 30px; box-sizing: border-box; color: #333; }
        .header { border-bottom: 6px solid var(--b); margin-bottom: 20px; }
        .header h1 { margin: 0; font-size: 45px; letter-spacing: -2px; font-weight: 900; }
        .meta { display: flex; justify-content: space-between; font-size: 12px; font-weight: 700; text-transform: uppercase; margin-bottom: 15px; }
        
        .saldo-anterior { background: #f0f0f0; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-radius: 6px; margin-bottom: 20px; }
        .saldo-anterior span { font-size: 14px; color: #666; }
        .saldo-anterior strong { font-size: 18px; }

        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th { text-align: left; font-size: 10px; text-transform: uppercase; color: #999; border-bottom: 1px solid #000; padding: 10px 5px; }
        td { padding: 12px 5px; border-bottom: 1px solid #eee; font-size: 11px; vertical-align: top; }
        .monto-celda { text-align: right; font-weight: 700; font-size: 12px; }
        .desc-celda { line-height: 1.3; color: #444; max-width: 200px; overflow-wrap: break-word; }
        
        .footer { border-top: 6px solid var(--b); padding-top: 15px; text-align: right; }
        .footer small { font-weight: 800; font-size: 12px; color: #888; }
        .footer .total { font-size: 38px; font-weight: 900; color: #000; margin-top: -5px; }
    </style>
</head>
<body>

<div class="controles">
    <div id="status">CONECTANDO...</div>
    <input type="date" id="f-fecha">
    <select id="f-cliente"><option value="">-- CLIENTE --</option></select>
    <button onclick="generar()">GENERAR REPORTE</button>
</div>

<div id="reporte">
    <div class="header"><h1>HOOLE</h1></div>
    <div class="meta">
        <span id="out-cli">---</span>
        <span id="out-fec">---</span>
    </div>
    <div class="saldo-anterior">
        <span>SALDO ANTERIOR</span>
        <strong id="out-ant">0.00</strong>
    </div>
    <table>
        <thead>
            <tr>
                <th>DESCRIPCIÓN / REF</th>
                <th style="text-align:right">MONTO</th>
                <th style="text-align:right">BALANCE</th>
            </tr>
        </thead>
        <tbody id="out-tabla"></tbody>
    </table>
    <div class="footer">
        <small>SALDO FINAL AL CIERRE</small>
        <div class="total" id="out-fin">0.00</div>
    </div>
</div>

<button onclick="descargar()" style="background:var(--g); width:400px; margin-top:15px; padding:18px; border-radius:12px; border:none; color:white; font-weight:bold; cursor:pointer;">📸 GUARDAR IMAGEN</button>

<script>
    let rawData = [];

    async function init() {
        try {
            const res = await fetch('B_Maestra.csv?v=' + Date.now());
            const text = await res.text();
            Papa.parse(text, {
                header: true, skipEmptyLines: true,
                complete: function(results) {
                    rawData = results.data;
                    const clientes = [...new Set(rawData.map(r => r.Grupo_1).filter(Boolean))].sort();
                    const select = document.getElementById('f-cliente');
                    select.innerHTML = '<option value="">-- SELECCIONAR CLIENTE --</option>';
                    clientes.forEach(c => select.innerHTML += `<option value="${c}">${c}</option>`);
                    document.getElementById('f-fecha').valueAsDate = new Date();
                    document.getElementById('status').innerText = "✅ BASE DE DATOS LISTA";
                }
            });
        } catch (e) { document.getElementById('status').innerText = "❌ ERROR"; }
    }

    function generar() {
        const cli = document.getElementById('f-cliente').value;
        const fec = document.getElementById('f-fecha').value;
        if(!cli || !fec) return;

        const inicio = new Date(fec + 'T00:00:00').getTime() / 1000;
        const fin = inicio + 86399;
        const dataCli = rawData.filter(r => r.Grupo_1 === cli);

        let ant = dataCli.reduce((acc, r) => parseFloat(r.Timestamp) < inicio ? acc + parseFloat(r.Saldo_1 || 0) : acc, 0);
        let movs = dataCli.filter(r => { let ts = parseFloat(r.Timestamp); return ts >= inicio && ts <= fin; });

        document.getElementById('out-cli').innerText = cli;
        document.getElementById('out-fec').innerText = fec;
        document.getElementById('out-ant').innerText = ant.toLocaleString('en-US',{minimumFractionDigits:2});
        
        let h = "", ac = ant;
        movs.forEach(m => {
            let v = parseFloat(m.Saldo_1 || 0); ac += v;
            // Limpiar descripción de saltos de línea molestos
            let desc = (m.Descripcion_1 || m.Operacion || 'PAGO').replace(/\n/g, ' / ');
            h += `<tr>
                <td class="desc-celda"><strong>${m.Operacion || 'MOV'}</strong><br>${desc}</td>
                <td class="monto-celda">${v.toLocaleString('en-US',{minimumFractionDigits:2})}</td>
                <td class="monto-celda" style="color:#888">${ac.toLocaleString('en-US',{minimumFractionDigits:2})}</td>
            </tr>`;
        });
        document.getElementById('out-tabla').innerHTML = h || '<tr><td colspan="3" style="text-align:center; padding:30px;">SIN MOVIMIENTOS</td></tr>';
        document.getElementById('out-fin').innerText = ac.toLocaleString('en-US',{minimumFractionDigits:2});
    }

    async function descargar() {
        const canvas = await html2canvas(document.getElementById('reporte'), {scale: 3});
        const link = document.createElement('a');
        link.download = `HOOLE_${document.getElementById('f-cliente').value}_${document.getElementById('f-fecha').value}.jpg`;
        link.href = canvas.toDataURL("image/jpeg", 1.0);
        link.click();
    }
    window.onload = init;
</script>
</body>
</html>
