<script>
    function generar() {
        const cli = document.getElementById('f-cliente').value.trim();
        const fec = document.getElementById('f-fecha').value;
        if(!cli || !fec) return alert("Selecciona fecha y cliente");

        const inicioDia = new Date(fec + 'T00:00:00').getTime() / 1000;
        const finDia = new Date(fec + 'T23:59:59').getTime() / 1000;

        Papa.parse('B_Maestra.csv', {
            download: true, 
            header: true, 
            skipEmptyLines: true,
            transformHeader: h => h.trim(), // Elimina espacios invisibles en los nombres de columnas
            complete: function(res) {
                // Filtrar datos ignorando mayúsculas/minúsculas y espacios
                const dataCli = res.data.filter(r => r.Grupo_1 && r.Grupo_1.trim().toUpperCase() === cli.toUpperCase());

                let ant = dataCli.reduce((acc, r) => {
                    let ts = parseInt(r.Timestamp);
                    return ts < inicioDia ? acc + parseFloat(r.Saldo_1 || 0) : acc;
                }, 0);

                let movs = dataCli.filter(r => {
                    let ts = parseInt(r.Timestamp);
                    return ts >= inicioDia && ts <= finDia;
                });

                document.getElementById('out-cli').innerText = cli;
                document.getElementById('out-fec').innerText = fec;
                document.getElementById('out-ant').innerText = ant.toLocaleString('en-US', {minimumFractionDigits:2});
                
                let h = "", ac = ant;
                movs.forEach(m => {
                    let v = parseFloat(m.Saldo_1 || 0); ac += v;
                    h += `<tr><td>${m.Operacion || 'PAGO'}<br><small style="color:#aaa">${m.Hash_Corto || ''}</small></td><td class="monto">${v.toLocaleString('en-US', {minimumFractionDigits:2})}</td><td style="text-align:right; color:#888">${ac.toLocaleString('en-US', {minimumFractionDigits:2})}</td></tr>`;
                });
                document.getElementById('out-tabla').innerHTML = h || '<tr><td colspan="3" style="text-align:center; padding:20px;">Sin movimientos este día</td></tr>';
                document.getElementById('out-fin').innerText = ac.toLocaleString('en-US', {minimumFractionDigits:2});
            },
            error: function(err) { alert("Error cargando el archivo: " + err); }
        });
    }
</script>
